services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - taskmesh-mongo:/data/db
  api:
    build: ./api
    env_file: ./api/.env.example
    environment:
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/taskmesh
    ports:
      - "3000:3000"
    depends_on:
      - mongo
  worker:
    build: ./worker
    env_file: ./worker/.env.example
    environment:
      API_BASE_URL: http://api:3000/api
      WORKER_ID: docker-worker-1
    depends_on:
      - api
  ui:
    build: ./ui
    environment:
      VITE_PROXY_API_URL: http://api:3000
    ports:
      - "5173:5173"
    depends_on:
      - api
volumes:
  taskmesh-mongo:
